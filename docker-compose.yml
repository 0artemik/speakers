services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: speakersdb
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: speakersdb
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d speakersdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: speakers-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://admin:admin@postgres:5432/speakersdb
    depends_on:
      postgres:
        condition: service_healthy

  streamlit:
    build: .
    container_name: speakers-ui
    command: ["streamlit", "run", "streamlit_app.py", "--server.port=8501", "--server.address=0.0.0.0"]
    ports:
      - "8501:8501"
    environment:
      API_URL: http://api:8000
    depends_on:
      - api

volumes:
  pgdata:
